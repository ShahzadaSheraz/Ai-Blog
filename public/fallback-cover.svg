<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Fallback cover image</title>
  <desc id="desc">A subtle gradient placeholder used when article cover images fail to load.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#4338ca" />
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)" />
  <g fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="12">
    <rect x="80" y="80" width="1040" height="640" rx="48" />
    <line x1="160" y1="240" x2="1040" y2="240" />
    <line x1="160" y1="360" x2="1040" y2="360" />
    <line x1="160" y1="480" x2="1040" y2="480" />
  </g>
  <text x="50%" y="75%" text-anchor="middle" fill="rgba(255,255,255,0.72)" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="600">
    Image not available
  </text>
</svg>
